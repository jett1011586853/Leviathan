name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run test
      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ("v$packageVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version $packageVersion"
          }
      - run: bun run build:release
      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item dist-release/leviathan.exe release/leviathan-windows-x64.exe
          Copy-Item scripts/leviathan-launcher.ps1 release/leviathan-launcher.ps1
          Copy-Item scripts/leviathan-updater.ps1 release/leviathan-updater.ps1
          $lines = Get-ChildItem release -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          [IO.File]::WriteAllLines((Join-Path $PWD 'release/SHA256SUMS'), $lines)
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem release -File | ForEach-Object { $_.FullName }
          gh release create "${{ github.ref_name }}" @assets --verify-tag --generate-notes --title "Leviathan ${{ github.ref_name }}"
